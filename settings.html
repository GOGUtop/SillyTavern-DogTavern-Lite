<div class="dog-top-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>🐶🦴TOP</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="dog-top-controls" style="padding: 10px;">
                <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 14px; font-weight: 600; color: var(--SmartThemeBodyColor);">
                        🐾 悬浮球开关
                    </label>
                    <input id="dog_top_float_toggle" type="checkbox" checked />
                </div>
                <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 14px; font-weight: 600; color: var(--SmartThemeBodyColor);">
                        🔊 提示音
                    </label>
                    <input id="dog_top_sound_toggle" type="checkbox" checked />
                </div>
                <div style="margin-bottom: 12px; display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 14px; font-weight: 600; color: var(--SmartThemeBodyColor);">
                        🌐 划词翻译
                    </label>
                    <input id="dog_top_translate_toggle" type="checkbox" checked />
                </div>
                <hr style="border-color: rgba(255,255,255,0.1); margin: 12px 0;" />
                <div style="font-size: 12px; color: var(--SmartThemeQuoteColor); line-height: 1.6;">
                    <p>🐶🦴TOP v1.5.0</p>
                    <p>✨ 功能：悬浮工具菜单 / 选中生成卡片 / 错误码翻译 / 划词翻译 / AI提示音</p>
                    <p>💡 悬浮球支持拖动 + 边缘吸附（露出50%）</p>
                </div>
            </div>
        </div>
    </div>
</div>
